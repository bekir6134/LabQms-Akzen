<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LabQMS Pro - Gelişmiş CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1E40AF; --border: #e2e8f0; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); padding: 20px; color: #334155; }
        .card { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .full { grid-column: 1 / -1; }
        .dynamic-row { display: flex; gap: 5px; margin-bottom: 5px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; color: #64748b; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        .btn-plus { background: #10B981; color: white; border: none; border-radius: 4px; padding: 0 12px; cursor: pointer; }
        .btn-save { background: var(--primary); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); text-align: left; }
        .btn-edit { color: var(--primary); font-weight: bold; cursor: pointer; border: 1px solid var(--primary); padding: 5px 10px; border-radius: 4px; background: white; }
    </style>
</head>
<body>

<div style="max-width: 1100px; margin: auto;">
    <div class="card">
        <h2 id="formTitle">🏢 Müşteri / Şube Kartı Oluştur</h2>
        <form id="musteriForm" onsubmit="kaydet(event)">
            <input type="hidden" id="musteriId">
            <div class="form-grid">
                <div class="full">
                    <label>Firma Resmi Ünvanı * (Fatura Bilgisi)</label>
                    <input type="text" id="firma_adi" required placeholder="Örn: ABC Endüstri A.Ş.">
                </div>
                <div class="full">
                    <label>Şube / Birim Adı (Sertifikaya Özel - Opsiyonel)</label>
                    <input type="text" id="sube_adi" placeholder="Örn: Gebze Fabrikası veya Ar-Ge Laboratuvarı">
                </div>
                
                <div>
                    <label>Yetkili Kişiler <button type="button" class="btn-plus" onclick="addField('yetkiliList')">+</button></label>
                    <div id="yetkiliList"><div class="dynamic-row"><input type="text" class="yetkili-input"></div></div>
                </div>
                <div>
                    <label>Telefonlar <button type="button" class="btn-plus" onclick="addField('telList')">+</button></label>
                    <div id="telList"><div class="dynamic-row"><input type="text" class="tel-input"></div></div>
                </div>

                <div>
                    <label>Sertifika Mailleri <button type="button" class="btn-plus" onclick="addField('sMailList')">+</button></label>
                    <div id="sMailList"><div class="dynamic-row"><input type="email" class="s-mail-input"></div></div>
                </div>
                <div>
                    <label>Fatura Mailleri <button type="button" class="btn-plus" onclick="addField('fMailList')">+</button></label>
                    <div id="fMailList"><div class="dynamic-row"><input type="email" class="f-mail-input"></div></div>
                </div>

                <div>
                    <label>İl / İlçe</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="il" placeholder="İl">
                        <input type="text" id="ilce" placeholder="İlçe">
                    </div>
                </div>
                <div>
                    <label>Vergi Dairesi / VKN</label>
                    <input type="text" id="vkn">
                </div>
                <div class="full">
                    <label>Açık Adres (Sertifikada Yazacak Olan)</label>
                    <textarea id="adres" rows="2"></textarea>
                </div>
            </div>
            <button type="submit" class="btn-save">💾 Müşteriyi / Şubeyi Sisteme İşle</button>
        </form>
    </div>

    <div class="card">
        <h3>📋 Kayıtlı Müşteri ve Lokasyonlar</h3>
        <table>
            <thead><tr><th>Ünvan / Şube</th><th>Lokasyon</th><th>İşlem</th></tr></thead>
            <tbody id="liste"></tbody>
        </table>
    </div>
</div>

<script>
    function addField(id, val = '') {
        const div = document.createElement("div");
        div.className = "dynamic-row";
        div.innerHTML = `<input type="${id.includes('Mail')?'email':'text'}" class="${id}-input" value="${val}"><button type="button" onclick="this.parentElement.remove()" style="background:#ef4444; color:white; border:none; border-radius:4px; cursor:pointer;">-</button>`;
        document.getElementById(id).appendChild(div);
    }

    async function listeYükle() {
        const res = await fetch('/api/musteriler');
        const data = await res.json();
        const liste = document.getElementById("liste");
        liste.innerHTML = "";
        data.forEach(m => {
            liste.innerHTML += `<tr>
                <td><strong>${m.firma_adi}</strong><br><small style="color:var(--primary)">${m.sube_adi || ''}</small></td>
                <td>${m.il || ''} / ${m.ilce || ''}</td>
                <td><button class="btn-edit" onclick='duzenle(${JSON.stringify(m)})'>Düzenle</button></td>
            </tr>`;
        });
    }

    function duzenle(m) {
        document.getElementById("musteriId").value = m.id;
        document.getElementById("firma_adi").value = m.firma_adi;
        document.getElementById("sube_adi").value = m.sube_adi || '';
        document.getElementById("il").value = m.il || '';
        document.getElementById("ilce").value = m.ilce || '';
        document.getElementById("adres").value = m.adres || '';
        document.getElementById("vkn").value = m.vergi_dairesi_vkn || '';
        
        // Dinamik alanları doldurma
        const setFields = (id, data) => {
            const cont = document.getElementById(id); cont.innerHTML = "";
            (data || ['']).forEach(v => addField(id, v));
        };
        setFields('yetkiliList', m.yetkililer);
        setFields('telList', m.telefonlar);
        setFields('sMailList', m.sertifika_mailleri);
        setFields('fMailList', m.fatura_mailleri);
        
        window.scrollTo(0,0);
        document.getElementById("formTitle").innerText = "📝 Müşteri Düzenleniyor...";
    }

    async function kaydet(e) {
        e.preventDefault();
        const body = {
            id: document.getElementById("musteriId").value,
            firma_adi: document.getElementById("firma_adi").value,
            sube_adi: document.getElementById("sube_adi").value,
            il: document.getElementById("il").value,
            ilce: document.getElementById("ilce").value,
            adres: document.getElementById("adres").value,
            vergi_dairesi_vkn: document.getElementById("vkn").value,
            yetkililer: Array.from(document.querySelectorAll(".yetkiliList-input")).map(i => i.value),
            telefonlar: Array.from(document.querySelectorAll(".telList-input")).map(i => i.value),
            sertifika_mailleri: Array.from(document.querySelectorAll(".sMailList-input")).map(i => i.value),
            fatura_mailleri: Array.from(document.querySelectorAll(".fMailList-input")).map(i => i.value)
        };

        const res = await fetch('/api/musteriler', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });

        if(res.ok) { 
            alert("Başarıyla kaydedildi!"); 
            location.reload(); 
        }
    }

    window.onload = listeYükle;
</script>
</body>
</html>
