<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sertifika Veri Girişi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #334155; padding: 20px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; text-align: center; font-family: monospace; font-size: 1rem;}
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #1E40AF; color: white; padding: 12px; border-right: 1px solid #3b82f6; }
        td { padding: 8px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; }
        .badge { padding: 5px 10px; border-radius: 6px; font-weight: bold; }
        .btn { background: #10B981; color: white; padding: 14px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div style="max-width: 900px; margin: 0 auto;">
        <div style="margin-bottom: 15px;"><a href="operasyon.html" style="text-decoration:none; color:#1E40AF; font-weight:bold;">⬅️ Operasyon Merkezine Dön</a></div>
        
        <div class="card">
            <h2>🔬 Cihaz Ölçüm Sonuçları (KAB-101)</h2>
            <div style="background: #eff6ff; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; color: #1e40af;">Cihaz: Dış Çap Mikrometresi | Seri No: SN-123</div>
            
            <table>
                <thead><tr><th>Referans Değer</th><th>Okunan Değer</th><th>Sapma (Otomatik)</th><th>Durum</th></tr></thead>
                <tbody id="olcumler">
                    <tr>
                        <td><input type="number" step="0.001" value="5.000" class="ref" oninput="hesapla(this)"></td>
                        <td><input type="number" step="0.001" placeholder="Girin..." class="okunan" oninput="hesapla(this)"></td>
                        <td><input type="text" value="0.000" class="sapma" readonly style="background:#f1f5f9; color:#1E40AF; font-weight:bold;"></td>
                        <td style="text-align:center;"><span class="badge" style="color:#64748b;">-</span></td>
                    </tr>
                </tbody>
            </table>
            <button onclick="satirEkle()" style="margin-top:10px; padding:10px; background:#f0fdf4; border:1px dashed #4ade80; color:#166534; cursor:pointer; width:100%; font-weight:bold;">+ Yeni Nokta</button>
            <button class="btn" onclick="alert('Veriler Kaydedildi! Onaylayıcı: Mustafa Öztürk (Otomatik)')">✅ Ölçümü Tamamla ve Onaya Gönder</button>
        </div>
    </div>

    <script>
        function hesapla(el) {
            let tr = el.closest('tr');
            let ref = parseFloat(tr.querySelector('.ref').value) || 0;
            let oku = parseFloat(tr.querySelector('.okunan').value) || 0;
            let sapma = oku - ref;
            tr.querySelector('.sapma').value = sapma.toFixed(3);
            
            let badge = tr.querySelector('.badge');
            if(Math.abs(sapma) > 0.005) {
                badge.innerText = "Sınır Dışı"; badge.style.color = "#ef4444"; tr.querySelector('.sapma').style.color = "#ef4444";
            } else if (oku !== 0) {
                badge.innerText = "Uygun"; badge.style.color = "#10B981"; tr.querySelector('.sapma').style.color = "#1E40AF";
            }
        }
        function satirEkle() {
            let tr = document.querySelector('#olcumler tr').cloneNode(true);
            tr.querySelector('.okunan').value = '';
            tr.querySelector('.sapma').value = '0.000';
            tr.querySelector('.badge').innerText = '-';
            tr.querySelector('.badge').style.color = '#64748b';
            document.getElementById('olcumler').appendChild(tr);
        }
    </script>
</body>
</html>
